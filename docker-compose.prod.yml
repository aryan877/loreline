services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: loreline
      POSTGRES_USER: loreline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - loreline_postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loreline -d loreline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy noeviction
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - loreline_redis_prod:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      target: development
    command: npm run db:migrate
    environment:
      DATABASE_URL: postgresql://loreline:${POSTGRES_PASSWORD}@postgres:5432/loreline
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      target: server-runner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://loreline:${POSTGRES_PASSWORD}@postgres:5432/loreline
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${BETTER_AUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY}
      OPENAI_REALTIME_MODEL: ${OPENAI_REALTIME_MODEL:-gpt-realtime-2.1-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY}
      OPENROUTER_COMPACTION_MODEL: ${OPENROUTER_COMPACTION_MODEL:-deepseek/deepseek-v4-flash}
      OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-openai/gpt-image-2}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:?Set R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?Set R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?Set R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-loreline-books}
    expose:
      - "3001"
    stop_grace_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/api/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      target: web-runner
    restart: unless-stopped
    environment:
      SERVER_INTERNAL_URL: http://server:3001
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy

volumes:
  loreline_postgres_prod:
  loreline_redis_prod:
