services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: loreline
      POSTGRES_USER: loreline
      POSTGRES_PASSWORD: loreline
    ports:
      - "5432:5432"
    volumes:
      - loreline_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loreline -d loreline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - loreline_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    profiles: ["app"]
    build:
      context: .
      target: development
    command: sh -c "npm run db:migrate && npm run dev --workspace=@loreline/server"
    environment:
      DATABASE_URL: postgresql://loreline:loreline@postgres:5432/loreline
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: local-docker-secret-change-before-production
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_REALTIME_MODEL: ${OPENAI_REALTIME_MODEL:-gpt-realtime-2.1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_COMPACTION_MODEL: ${OPENROUTER_COMPACTION_MODEL:-deepseek/deepseek-v4-flash}
      OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-openai/gpt-image-1-mini}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-loreline-books}
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - loreline_node_modules:/app/node_modules
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3001/api/ready",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    profiles: ["app"]
    build:
      context: .
      target: development
    command: npm run dev --workspace=@loreline/web -- --hostname 0.0.0.0
    environment:
      NEXT_DIST_DIR: .next-docker
      SERVER_INTERNAL_URL: http://server:3001
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - loreline_node_modules:/app/node_modules
    tmpfs:
      - /app/apps/web/.next-docker
    depends_on:
      server:
        condition: service_healthy

volumes:
  loreline_postgres:
  loreline_redis:
  loreline_node_modules:
