  <text x="132" y="174" class="small">NEXT.JS WEB</text>
  <text x="132" y="199" class="heading">The reading room</text>
  <text x="82" y="240" class="body">Continuous PDF reader</text>
  <text x="82" y="268" class="body">Realtime voice and visible tools</text>
  <text x="82" y="296" class="body">Notes, highlights, and board</text>

  <circle cx="488" cy="176" r="18" fill="#17170f"/>
  <text x="488" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700" fill="#f8f7ed">E</text>
  <text x="522" y="174" class="small">EFFECT + NODE</text>
  <text x="522" y="199" class="heading">The application API</text>
  <text x="475" y="240" class="body">Auth and ownership</text>
  <text x="475" y="268" class="body">PDF parsing and hybrid RAG</text>
  <text x="475" y="296" class="body">Supervised indexing worker</text>

  <circle cx="881" cy="176" r="18" fill="#17170f"/>
  <text x="881" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f8f7ed">{ }</text>
  <text x="915" y="174" class="small">SHARED PACKAGES</text>
