<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Loreline architecture</title>
  <desc id="desc">A Next.js reader talks to an Effect API and shared packages. PostgreSQL, Redis, Cloudflare R2, OpenAI, and OpenRouter provide data, indexing, storage, voice, and model services.</desc>
  <defs>
    <style>
      .title{font:700 30px Inter,system-ui,sans-serif;fill:#17170f}.subtitle{font:400 15px Inter,system-ui,sans-serif;fill:#666653}.heading{font:700 18px Inter,system-ui,sans-serif;fill:#17170f}.body{font:400 14px Inter,system-ui,sans-serif;fill:#4c4c3c}.small{font:700 11px Inter,system-ui,sans-serif;fill:#666653;letter-spacing:.08em}.box{fill:#fffef5;stroke:#c7c5aa;stroke-width:2}.yellow{fill:#f1f0c8}.green{fill:#e5efdc}.pink{fill:#f5e4ed}.provider{fill:#fffef5}.arrow{stroke:#77775f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#77775f"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="135%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#242414" flood-opacity=".08"/></filter>
  </defs>

  <rect width="1200" height="660" rx="28" fill="#f8f7ed"/>
  <text x="52" y="58" class="title">How Loreline fits together</text>
  <text x="52" y="84" class="subtitle">The PDF stays in the browser. The API owns data, retrieval, and durable work.</text>

  <g filter="url(#shadow)">
    <rect x="52" y="126" width="310" height="220" rx="22" class="box yellow"/>
    <rect x="445" y="126" width="310" height="220" rx="22" class="box green"/>
    <rect x="838" y="126" width="310" height="220" rx="22" class="box pink"/>
  </g>

  <image href="brands/nextdotjs.svg" x="82" y="158" width="36" height="36"/>
  <text x="132" y="174" class="small">NEXT.JS WEB</text>
  <text x="132" y="199" class="heading">The reading room</text>
  <text x="82" y="240" class="body">Continuous PDF reader</text>
  <text x="82" y="268" class="body">Realtime voice and visible tools</text>
  <text x="82" y="296" class="body">Notes, highlights, and board</text>

  <circle cx="488" cy="176" r="18" fill="#17170f"/>
  <text x="488" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700" fill="#f8f7ed">E</text>
  <text x="522" y="174" class="small">EFFECT + NODE</text>
  <text x="522" y="199" class="heading">The application API</text>
  <text x="475" y="240" class="body">Auth and ownership</text>
  <text x="475" y="268" class="body">PDF parsing and hybrid RAG</text>
  <text x="475" y="296" class="body">Supervised indexing worker</text>

  <circle cx="881" cy="176" r="18" fill="#17170f"/>
  <text x="881" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f8f7ed">{ }</text>
  <text x="915" y="174" class="small">SHARED PACKAGES</text>
  <text x="915" y="199" class="heading">One source of truth</text>
  <text x="868" y="240" class="body">Zod API contracts</text>
  <text x="868" y="268" class="body">Drizzle schema and migrations</text>
  <text x="868" y="296" class="body">Shared domain types and limits</text>

  <path d="M362 236H445" class="arrow"/>
  <path d="M755 236H838" class="arrow"/>

  <text x="52" y="402" class="small">DATA AND MODEL SERVICES</text>
  <g filter="url(#shadow)">
    <rect x="52" y="430" width="200" height="142" rx="18" class="box provider"/>
    <rect x="276" y="430" width="200" height="142" rx="18" class="box provider"/>
    <rect x="500" y="430" width="200" height="142" rx="18" class="box provider"/>
    <rect x="724" y="430" width="200" height="142" rx="18" class="box provider"/>
    <rect x="948" y="430" width="200" height="142" rx="18" class="box provider"/>
  </g>

  <image href="brands/postgresql.svg" x="78" y="456" width="34" height="34"/>
  <text x="126" y="471" class="heading">PostgreSQL</text>
  <text x="78" y="520" class="body">Data, text search,</text>
  <text x="78" y="544" class="body">and vectors</text>

  <image href="brands/redis.svg" x="302" y="456" width="34" height="34"/>
  <text x="350" y="471" class="heading">Redis</text>
  <text x="302" y="520" class="body">Durable jobs, limits,</text>
  <text x="302" y="544" class="body">and auth cache</text>

  <image href="brands/cloudflare.svg" x="526" y="456" width="34" height="34"/>
  <text x="574" y="471" class="heading">Cloudflare R2</text>
  <text x="526" y="520" class="body">Private PDFs</text>
  <text x="526" y="544" class="body">and visual assets</text>

  <image href="brands/openai.svg" x="750" y="456" width="34" height="34"/>
  <text x="798" y="471" class="heading">OpenAI</text>
  <text x="750" y="520" class="body">GPT Realtime 2.1</text>
  <text x="750" y="544" class="body">over WebRTC</text>

  <image href="brands/openrouter.svg" x="974" y="456" width="34" height="34"/>
  <text x="1022" y="471" class="heading">OpenRouter</text>
  <text x="974" y="520" class="body">Embeddings, images,</text>
  <text x="974" y="544" class="body">and compaction</text>

  <path d="M530 346L178 430" class="arrow"/>
  <path d="M565 346L392 430" class="arrow"/>
  <path d="M600 346V430" class="arrow"/>
  <path d="M635 346L808 430" class="arrow"/>
  <path d="M670 346L1022 430" class="arrow"/>
</svg>
