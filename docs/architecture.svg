    <rect x="52" y="126" width="310" height="220" rx="22" class="box yellow"/>
    <rect x="445" y="126" width="310" height="220" rx="22" class="box green"/>
    <rect x="838" y="126" width="310" height="220" rx="22" class="box pink"/>
  </g>

